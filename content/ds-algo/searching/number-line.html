<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; font-family: system-ui, sans-serif; }
  #wrap { padding: 16px; }
  #line { position: relative; height: 60px; margin: 24px 8px; }
  .tick { position: absolute; top: 0; width: 2px; height: 24px; background: #cbd5e1; transform: translateX(-1px); }
  .lbl { position: absolute; top: 28px; transform: translateX(-50%); font-size: 12px; color: #64748b; }
  #cursor { position: absolute; top: -6px; width: 16px; height: 16px; border-radius: 50%; background: #4f46e5; transform: translate(-50%, 0); transition: left .25s ease; }
  button { font: inherit; padding: 8px 14px; border: none; border-radius: 8px; background: #4f46e5; color: #fff; cursor: pointer; }
  #val { margin-left: 12px; font-weight: 600; color: #4f46e5; }
</style>
</head>
<body>
<div id="wrap">
  <div id="line"><div id="cursor"></div></div>
  <button onclick="probe()">Probe next</button>
  <span id="val">mid = —</span>
</div>
<script>
  const data = [1, 4, 5, 7, 8, 11, 14, 20];
  const line = document.getElementById('line');
  const cursor = document.getElementById('cursor');
  const val = document.getElementById('val');
  data.forEach((d, i) => {
    const x = (i / (data.length - 1)) * 100;
    const t = document.createElement('div'); t.className = 'tick'; t.style.left = x + '%'; line.appendChild(t);
    const l = document.createElement('div'); l.className = 'lbl'; l.style.left = x + '%'; l.textContent = d; line.appendChild(l);
  });
  let lo = 0, hi = data.length - 1;
  function probe() {
    if (lo > hi) { val.textContent = 'done'; return; }
    const mid = (lo + hi) >> 1;
    cursor.style.left = ((mid / (data.length - 1)) * 100) + '%';
    val.textContent = 'mid = ' + data[mid];
    lo = mid + 1; // demo: just walk forward
  }
  probe();
</script>
</body>
</html>
